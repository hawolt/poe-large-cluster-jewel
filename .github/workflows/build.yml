name: Build Project
on:
  push:
    branches:
      - dev
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check if frontend/src changed
        id: src_changed
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'frontend/src/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # Frontend TypeScript build
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        if: steps.src_changed.outputs.changed == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.src_changed.outputs.changed == 'true'
        run: npm install

      - name: Build the project
        if: steps.src_changed.outputs.changed == 'true'
        run: npm run build

      # -----------------------------------------------------------------------
      # Java exporter — always runs
      # -----------------------------------------------------------------------
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download org.json dependency
        working-directory: ${{ github.workspace }}
        run: curl -L -o org.json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      - name: Compile Java
        working-directory: ${{ github.workspace }}
        run: javac -cp org.json.jar automation/Exporter.java automation/ModLoader.java automation/ClusterParser.java -d automation/out

      - name: Run Exporter
        working-directory: ${{ github.workspace }}
        run: |
          cp automation/ClusterJewels.lua .
          java -cp automation/out:org.json.jar Exporter

      - name: Move JSON output files
        working-directory: ${{ github.workspace }}
        run: mv large_cluster_types.json medium_cluster_types.json small_cluster_types.json notable_ids.json frontend/public/data/

      # -----------------------------------------------------------------------
      # Atlas builder — always runs
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libmagickwand-dev
          pip install pillow wand

      - name: Build icon atlas
        working-directory: ${{ github.workspace }}
        run: python automation/build_atlas.py

      # -----------------------------------------------------------------------
      # Commit all generated artifacts back to dev
      # -----------------------------------------------------------------------
      - name: Commit and push all artifacts
        working-directory: ${{ github.workspace }}
        run: |
          git checkout dev
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          if [ "${{ steps.src_changed.outputs.changed }}" == "true" ]; then
            git add frontend/public/bundle.js
          fi

          git add frontend/public/data/large_cluster_types.json
          git add frontend/public/data/medium_cluster_types.json
          git add frontend/public/data/small_cluster_types.json
          git add frontend/public/data/notable_ids.json
          git add frontend/public/atlas.webp

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: update artifacts"
            git push origin dev
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
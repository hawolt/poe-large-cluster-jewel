name: Build Project
on:
  push:
    branches:
      - dev
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check if ClusterJewels.lua changed
        id: lua_changed
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'java/ClusterJewels.lua'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if frontend/src changed
        id: src_changed
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'frontend/src/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.src_changed.outputs.changed == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        if: steps.src_changed.outputs.changed == 'true'
        run: npm install
      - name: Build the project
        if: steps.src_changed.outputs.changed == 'true'
        run: npm run build

      - name: Set up Java
        if: steps.lua_changed.outputs.changed == 'true'
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download org.json dependency
        if: steps.lua_changed.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: curl -L -o org.json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar
      - name: Compile Java
        if: steps.lua_changed.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: javac -cp org.json.jar java/Exporter.java java/ModLoader.java java/ClusterParser.java -d java/out
      - name: Run Exporter
        if: steps.lua_changed.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          cp java/ClusterJewels.lua .
          java -cp java/out:org.json.jar Exporter
      - name: Move output files
        if: steps.lua_changed.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: mv noteable_ids.json large_cluster_types.json medium_cluster_types.json small_cluster_types.json frontend/public/data/

      - name: Commit and push all artifacts
        if: steps.src_changed.outputs.changed == 'true' || steps.lua_changed.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git checkout dev
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ "${{ steps.src_changed.outputs.changed }}" == "true" ]; then
            git add frontend/public/bundle.js
          fi
          if [ "${{ steps.lua_changed.outputs.changed }}" == "true" ]; then
            git add frontend/public/data/large_cluster_types.json
            git add frontend/public/data/medium_cluster_types.json
            git add frontend/public/data/small_cluster_types.json
            git add frontend/public/data/noteable_ids.json
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: update artifacts"
            git push origin dev
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}